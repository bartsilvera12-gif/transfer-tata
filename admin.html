<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin — Transfers Tatá</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="admin-config.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Manrope', sans-serif;
    background: #F4E2D8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .page {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .logo-img {
    height: 72px;
    object-fit: contain;
    margin-bottom: 28px;
  }
  .eyebrow {
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: .18em;
    color: #B8872F;
    margin-bottom: 10px;
    text-align: center;
  }
  h1 {
    font-size: 26px;
    font-weight: 700;
    color: #1E1713;
    text-align: center;
    margin-bottom: 28px;
  }
  .divider {
    width: 100%;
    height: 1px;
    background: rgba(184,135,47,.25);
    margin-bottom: 28px;
  }
  .card {
    width: 100%;
    background: #fff;
    border: 1px solid rgba(184,135,47,.22);
    border-radius: 24px;
    padding: 28px;
    box-shadow: 0 8px 32px rgba(45,31,24,.10);
  }
  .admin-badge {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    background: rgba(184,135,47,.08);
    border: 1px solid rgba(184,135,47,.2);
    border-radius: 16px;
    margin-bottom: 24px;
  }
  .badge-icon {
    width: 42px; height: 42px; border-radius: 12px;
    background: rgba(184,135,47,.14);
    display: grid; place-items: center;
    font-size: 20px; flex-shrink: 0;
  }
  .badge-title { color: #1E1713; font-weight: 700; font-size: 14px; }
  .badge-sub { color: #9A8070; font-size: 12px; margin-top: 2px; }

  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .12em;
    color: #9A8070;
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .field input {
    width: 100%;
    background: #FFF4EA;
    border: 1.5px solid rgba(184,135,47,.25);
    border-radius: 12px;
    padding: 13px 16px;
    color: #1E1713;
    font: 500 15px 'Manrope', sans-serif;
    outline: none;
    transition: border-color .2s;
  }
  .field input::placeholder { color: #C4A98A; }
  .field input:focus { border-color: #B8872F; }

  .pw-wrap { position: relative; }
  .pw-wrap input { padding-right: 48px; }
  .eye-btn {
    position: absolute; right: 14px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: #C4A98A; font-size: 16px; padding: 4px;
    transition: color .2s;
  }
  .eye-btn:hover { color: #B8872F; }

  .error {
    color: #E05C5C; font-size: 13px; font-weight: 500;
    min-height: 20px; margin-bottom: 6px; text-align: center;
  }
  .btn-login {
    width: 100%;
    background: linear-gradient(135deg, #B8872F, #D8AE55);
    color: #1E1713; border: none; border-radius: 12px;
    padding: 15px;
    font: 700 15px 'Manrope', sans-serif;
    cursor: pointer;
    transition: opacity .2s, transform .15s;
    letter-spacing: .02em;
  }
  .btn-login:hover { opacity: .9; transform: translateY(-1px); }
  .btn-login:disabled { opacity: .5; cursor: not-allowed; transform: none; }
</style>
</head>
<body>
<div class="page">
  <img src="uploads/logo2.png" alt="Transfers Tatá" class="logo-img" />
  <p class="eyebrow">ÁREA PRIVADA</p>
  <h1>Panel de administración</h1>
  <div class="divider"></div>
  <div class="card">
    <div class="admin-badge">
      <div class="badge-icon">🛡️</div>
      <div>
        <div class="badge-title">Administrador</div>
        <div class="badge-sub">Acceso restringido al equipo</div>
      </div>
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="admin@transferstata.com" autocomplete="email" />
    </div>
    <div class="field">
      <label>Contraseña</label>
      <div class="pw-wrap">
        <input type="password" id="password" placeholder="••••••••••••" autocomplete="current-password" />
        <button class="eye-btn" type="button" onclick="togglePw(this)">👁</button>
      </div>
    </div>
    <div class="error" id="errorMsg"></div>
    <button class="btn-login" id="loginBtn" onclick="login()">🛡 Ingresar</button>
  </div>
</div>

<script>
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY, { db: { schema: 'transfertata' } });

  sb.auth.getSession().then(({ data: { session } }) => {
    if (session) location.href = 'admin-panel.html';
  });

  async function login() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errEl    = document.getElementById('errorMsg');
    const btn      = document.getElementById('loginBtn');
    errEl.textContent = '';
    if (!email || !password) { errEl.textContent = 'Completá email y contraseña'; return; }
    btn.disabled = true; btn.textContent = 'Ingresando…';
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) {
      errEl.textContent = 'Email o contraseña incorrectos';
      btn.disabled = false; btn.textContent = '🛡 Ingresar';
    } else {
      location.href = 'admin-panel.html';
    }
  }

  function togglePw(btn) {
    const input = document.getElementById('password');
    input.type = input.type === 'password' ? 'text' : 'password';
    btn.textContent = input.type === 'password' ? '👁' : '🙈';
  }

  document.getElementById('email').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('password').focus();
  });
  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });
</script>
</body>
</html>
